  </g>
  <g transform="translate(330 440)">
    <rect width="156" height="58" rx="12" fill="#fff2ea"/>
    <text x="24" y="38" fill="#ad4f1a" font-family="Arial, sans-serif" font-size="22" font-weight="800">No login</text>
  </g>
  <g transform="translate(508 440)">
    <rect width="196" height="58" rx="12" fill="#e8f2ed"/>
    <text x="24" y="38" fill="#116a4b" font-family="Arial, sans-serif" font-size="22" font-weight="800">Open source</text>
  </g>
  <circle cx="960" cy="254" r="112" fill="#116a4b"/>
  <text x="960" y="232" fill="#ffffff" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="800">Pricing</text>
  <text x="960" y="282" fill="#ffffff" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="800">QA</text>
